databases:
  - name: landreg-db
    databaseName: landreg
    user: landreg
    plan: free

services:
  # ── Django API ─────────────────────────────────────────────────────────────
  - type: web
    name: landreg-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn landreg_project.wsgi:application --workers 2 --bind 0.0.0.0:$PORT"
    healthCheckPath: /health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: landreg-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: landreg-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@landreg.go.tz
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── React Frontend ─────────────────────────────────────────────────────────
  - type: web
    name: landreg-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "pnpm install && pnpm build"
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: landreg-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_VERSION
        value: "20.15.0"
